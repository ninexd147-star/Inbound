<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbound – AdvancedPlus Cloud</title>
  
  <!-- UI Frameworks -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body { background: #0b1530; font-family: 'IBM Plex Sans Thai', sans-serif; }
    .glass-panel { background: rgba(22,34,70,0.9); border: 1px solid rgba(255,109,0,0.2); backdrop-filter: blur(10px); }
    .input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; padding: 10px 15px; outline: none; transition: 0.2s; }
    .input-field:focus { border-color: #FF6D00; box-shadow: 0 0 0 3px rgba(255,109,0,0.1); }
    #sn-field { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; border: 1px solid rgba(255,109,0,0.4); background: rgba(255,109,0,0.05); }
    .btn-primary { background: linear-gradient(135deg, #FF6D00, #FF8C00); color: white; font-weight: bold; border-radius: 8px; padding: 12px; transition: 0.2s; cursor: pointer; text-align: center; border: none; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,109,0,0.3); }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: rgba(255,109,0,0.1); color: #FF6D00; padding: 12px; text-align: left; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid rgba(255,109,0,0.2); }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
  </style>
</head>
<body class="text-white">

  <!-- Navigation Bar -->
  <header class="border-b border-white/5 bg-navy/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-ember rounded-lg flex items-center justify-center font-bold text-white">A+</div>
        <span class="font-bold tracking-tighter">ADVANCEDPLUS <span class="text-orange-500">CLOUD</span></span>
      </div>
      <nav class="flex gap-8 text-sm font-bold uppercase tracking-widest">
        <a href="index.html" class="text-orange-500 border-b-2 border-orange-500 pb-1">Inbound</a>
        <a href="inventory.html" class="text-white/40 hover:text-white">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-[400px_1fr] gap-8">
      
      <!-- ส่วนที่ 1: ฟอร์มกรอกข้อมูล -->
      <section class="glass-panel p-6 rounded-2xl h-fit">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
          <span class="w-2 h-6 bg-orange-500 rounded-full"></span> รับเข้าสินค้าใหม่
        </h2>
        
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-white/40 mb-2 uppercase">Model / รุ่นสินค้า</label>
            <input list="model-list" id="model-input" class="input-field" placeholder="เลือกหรือพิมพ์ชื่อรุ่น...">
            <datalist id="model-list"></datalist>
          </div>

          <div>
            <label class="block text-xs font-bold text-white/40 mb-2 uppercase">Serial Number (S/N)</label>
            <input id="sn-field" class="input-field" placeholder="สแกนหรือพิมพ์ S/N ที่นี่..." autocomplete="off">
          </div>

          <div>
            <label class="block text-xs font-bold text-white/40 mb-2 uppercase">Supplier / ผู้จัดจำหน่าย</label>
            <input list="supplier-list" id="supplier-input" class="input-field" placeholder="เลือกผู้จัดจำหน่าย...">
            <datalist id="supplier-list"></datalist>
          </div>

          <div>
            <label class="block text-xs font-bold text-white/40 mb-2 uppercase">Invoice No. / เลขใบส่งของ</label>
            <input id="invoice-input" class="input-field font-mono" placeholder="ระบุเลขที่บิล...">
          </div>

          <div>
            <label class="block text-xs font-bold text-white/40 mb-2 uppercase">Note / หมายเหตุ</label>
            <textarea id="note-input" class="input-field resize-none" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
          </div>

          <button onclick="handleManualAdd()" class="btn-primary w-full mt-4">เพิ่มเข้าตารางพัก (Enter)</button>
        </div>
      </section>

      <!-- ส่วนที่ 2: ตารางแสดงรายการที่สแกนแล้วแต่ยังไม่ได้บันทึก -->
      <section class="flex flex-col gap-6">
        <div class="glass-panel rounded-2xl overflow-hidden flex-1 flex flex-col">
          <div class="p-5 border-b border-white/5 bg-white/5 flex justify-between items-center">
            <h3 class="text-sm font-bold text-white/60 uppercase">รายการรอการบันทึก</h3>
            <div class="flex items-center gap-4">
              <span class="bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded" id="staged-count">0 ITEMS</span>
              <button onclick="clearAllStaged()" class="text-[10px] text-red-400 font-bold hover:underline uppercase">ล้างทั้งหมด</button>
            </div>
          </div>

          <div class="overflow-auto max-h-[500px]">
            <table class="data-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Model</th>
                  <th>Serial Number</th>
                  <th>Supplier</th>
                  <th>Invoice</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="staged-tbody"></tbody>
            </table>
            <div id="empty-state" class="py-20 text-center text-white/10 font-bold uppercase tracking-widest text-xs">
              ยังไม่มีข้อมูลในรายการพัก
            </div>
          </div>
        </div>

        <!-- ปุ่มยืนยันการบันทึก -->
        <button id="final-save-btn" onclick="submitToCloud()" disabled class="w-full py-4 border-2 border-orange-500 text-orange-500 rounded-xl font-bold uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-all disabled:opacity-20 disabled:cursor-not-allowed">
          บันทึกข้อมูลเข้าสู่ Cloud Database ✅
        </button>
      </section>
    </div>
  </main>

  <!-- ระบบแจ้งเตือน (Toast) -->
  <div id="toast-box" class="fixed bottom-8 right-8 z-[100] pointer-events-none"></div>

  <!-- Firebase & Logic Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. การตั้งค่า Firebase (พี่ห้ามแก้ส่วนนี้เด็ดขาด)
    const firebaseConfig = { 
      apiKey: "AIzaSyDKnlB-dWr60Aanaa5g9Av7NdB9pIutcnw", 
      authDomain: "advancedplus-stock.firebaseapp.com", 
      projectId: "advancedplus-stock", 
      storageBucket: "advancedplus-stock.firebasestorage.app", 
      messagingSenderId: "406022848223", 
      appId: "1:406022848223:web:0d625edcb7720d1d6db36a" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. ตัวแปรเก็บข้อมูลชั่วคราว
    let stagedData = [];

    // 3. ฟังก์ชันโหลดค่า Model และ Supplier จาก Cloud
    async function loadDropdownData() {
      try {
        const snap = await getDoc(doc(db, "system_settings", "dropdowns"));
        if (snap.exists()) {
          const { models, suppliers } = snap.data();
          document.getElementById('model-list').innerHTML = models.map(m => `<option value="${m}">`).join('');
          document.getElementById('supplier-list').innerHTML = suppliers.map(s => `<option value="${s}">`).join('');
        }
      } catch (e) { console.error("Error loading settings:", e); }
    }

    // 4. ฟังก์ชันเพิ่มรายการลงตาราง (รองรับ Enter)
    window.handleManualAdd = () => {
      const snInput = document.getElementById('sn-field');
      const sn = snInput.value.trim();

      if (!sn) { 
        showToast("⚠️ กรุณาระบุ S/N ก่อนเพิ่มรายการ", "error"); 
        snInput.focus();
        return; 
      }

      // ตรวจสอบ S/N ซ้ำในรายการพัก
      if (stagedData.some(item => item.sn === sn)) {
        showToast("🔁 S/N นี้อยู่ในรายการพักแล้ว", "error");
        snInput.value = '';
        snInput.focus();
        return;
      }

      const newItem = {
        id: Date.now(),
        model: document.getElementById('model-input').value || '-',
        sn: sn,
        supplier: document.getElementById('supplier-input').value || '-',
        invoice: document.getElementById('invoice-input').value || '-',
        note: document.getElementById('note-input').value || ''
      };

      stagedData.push(newItem);
      snInput.value = '';
      snInput.focus();
      renderUI();
      showToast("✅ เพิ่มรายการสำเร็จ");
    };

    // 5. ฟังก์ชันแสดงผลตาราง
    function renderUI() {
      const tbody = document.getElementById('staged-tbody');
      const empty = document.getElementById('empty-state');
      const btn = document.getElementById('final-save-btn');
      
      document.getElementById('staged-count').textContent = `${stagedData.length} ITEMS`;
      empty.style.display = stagedData.length ? 'none' : 'block';
      btn.disabled = stagedData.length === 0;

      tbody.innerHTML = stagedData.map((item, index) => `
        <tr class="animate-in fade-in slide-in-from-left-4 duration-300">
          <td class="text-white/20 font-mono text-[10px]">${index + 1}</td>
          <td class="font-bold text-white/80">${item.model}</td>
          <td class="font-mono text-orange-500 font-bold">${item.sn}</td>
          <td>${item.supplier}</td>
          <td class="font-mono text-xs opacity-50">${item.invoice}</td>
          <td>
            <button onclick="removeItem(${item.id})" class="text-red-400 hover:text-red-200 transition-colors p-2">✕</button>
          </td>
        </tr>
      `).join('');
    }

    // 6. ฟังก์ชันบันทึกข้อมูลทั้งหมดขึ้น Cloud (9 ฟิลด์ตามสั่ง)
    window.submitToCloud = async () => {
      const btn = document.getElementById('final-save-btn');
      btn.disabled = true;
      showToast("⏳ กำลังเชื่อมต่อ Cloud Database...");

      try {
        const promises = stagedData.map(item => {
          return addDoc(collection(db, "inbound_stock"), {
            date_in: serverTimestamp(),       // 1. วันที่รับเข้า
            order_number: "",                 // 2. ลำดับ (ไว้รันตอนดึงข้อมูล)
            model: item.model,                // 3. ชื่อสินค้า/รุ่น
            sn: item.sn,                      // 4. Serial Number
            duration: 0,                      // 5. ระยะเวลา (วัน)
            last_updated: serverTimestamp(),  // 6. อัปเดตล่าสุด
            supplier: item.supplier,          // 7. ผู้ขาย
            invoice: item.invoice,            // 8. เลขบิล
            note: item.note                   // 9. หมายเหตุ
          });
        });

        await Promise.all(promises);
        showToast("🚀 บันทึกข้อมูลสำเร็จทั้งหมดแล้ว!");
        stagedData = [];
        renderUI();
      } catch (err) {
        console.error(err);
        showToast("❌ เกิดข้อผิดพลาดในการบันทึก", "error");
        btn.disabled = false;
      }
    };

    // ฟังก์ชันย่อย
    window.removeItem = (id) => { stagedData = stagedData.filter(x => x.id !== id); renderUI(); };
    window.clearAllStaged = () => { if(confirm("ล้างรายการทั้งหมด?")) { stagedData = []; renderUI(); } };
    
    function showToast(msg, type = "success") {
      const box = document.getElementById('toast-box');
      const toast = document.createElement('div');
      toast.className = `p-4 mb-3 rounded-lg border shadow-2xl transition-all duration-500 translate-y-10 opacity-0 ${type === 'success' ? 'bg-navy/90 border-green-500 text-green-400' : 'bg-navy/90 border-red-500 text-red-400'}`;
      toast.textContent = msg;
      box.appendChild(toast);
      setTimeout(() => { toast.classList.remove('translate-y-10', 'opacity-0'); }, 10);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
    }

    document.getElementById('sn-field').addEventListener('keydown', (e) => { if(e.key === 'Enter') handleManualAdd(); });
    loadDropdownData();
  </script>
</body>
</html>
