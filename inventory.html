<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Dashboard – AdvancedPlus Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:   { DEFAULT: '#0f1c3f', 800: '#162246', 700: '#1e2f5a', 600: '#263971', 500: '#3a5298' },
            ember:  { DEFAULT: '#FF6D00', 400: '#FF8C00', 300: '#FFA726', 100: '#FFF3E0' },
          },
          fontFamily: {
            sans: ['IBM Plex Sans Thai', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    /* ── base ── */
    body { background: #0b1530; }

    /* grid background dots */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,109,0,.08) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* orange glow blob */
    .glow-blob {
      position: fixed; top: -120px; right: -120px; z-index: 0;
      width: 480px; height: 480px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,109,0,.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* card panels */
    .panel {
      background: linear-gradient(145deg, rgba(22,34,70,.92), rgba(15,28,63,.95));
      border: 1px solid rgba(255,109,0,.15);
      backdrop-filter: blur(12px);
    }

    /* inputs & search */
    .field {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; color: #e8ecf5; padding: .6rem .9rem; font-size: .9rem;
      transition: border-color .2s, box-shadow .2s; outline: none; font-family: 'IBM Plex Sans Thai', sans-serif;
    }
    .field:focus { border-color: rgba(255,109,0,.6); box-shadow: 0 0 0 3px rgba(255,109,0,.1); }
    .field::placeholder { color: rgba(255,255,255,.25); }

    /* table styling */
    .data-table { border-collapse: collapse; width: 100%; }
    .data-table th {
      background: rgba(255,109,0,.08); color: rgba(255,109,0,.9);
      font-size: .75rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      padding: .8rem 1rem; text-align: left; border-bottom: 1px solid rgba(255,109,0,.2);
      position: sticky; top: 0; backdrop-filter: blur(8px); z-index: 10;
    }
    .data-table td {
      padding: .75rem 1rem; font-size: .85rem; color: #c8d0e8;
      border-bottom: 1px solid rgba(255,255,255,.05); vertical-align: middle;
    }
    .data-table tbody tr { transition: background .15s; }
    .data-table tbody tr:hover { background: rgba(255,109,0,.05); }

    /* loading spinner */
    .loader {
      border: 3px solid rgba(255,255,255,.1); border-top: 3px solid #FF6D00;
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,109,0,.3); border-radius: 99px; }
  </style>
</head>
<body class="font-sans min-h-screen text-white relative">

  <div class="glow-blob"></div>

  <!-- ── HEADER ── -->
  <header class="relative z-10 border-b border-white/5 bg-navy/60 backdrop-blur-md">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-8 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-ember to-orange-300 flex items-center justify-center shadow-lg shadow-ember/30">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/></svg>
        </div>
        <span class="text-sm font-bold tracking-widest uppercase text-white/80">AdvancedPlus <span class="text-ember">Cloud</span></span>
      </div>
      <div class="flex items-center gap-4">
        <!-- Navigation Link กลับไปหน้า Inbound -->
        <a href="inbound.html" class="text-xs font-semibold text-white/50 hover:text-white transition-colors">← ไปหน้าสแกนรับเข้า</a>
        <div class="flex items-center gap-2 bg-white/5 rounded-full px-3 py-1 border border-white/10">
          <div class="w-5 h-5 rounded-full bg-gradient-to-br from-ember to-yellow-400 flex items-center justify-center text-[10px] font-bold">W</div>
          <span class="text-xs text-white/60 hidden sm:inline">Warehouse</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ── PAGE BODY ── -->
  <main class="relative z-10 max-w-screen-xl mx-auto px-4 sm:px-8 py-8 flex flex-col h-[calc(100vh-56px)]">

    <!-- Header & Search -->
    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-6 shrink-0">
      <div>
        <p class="text-xs font-semibold uppercase tracking-widest text-ember/60 mb-1">Dashboard · คลังสินค้า</p>
        <h1 class="text-2xl sm:text-3xl font-bold text-white leading-tight">ระบบตรวจสอบสินค้าคงคลัง</h1>
      </div>
      
      <div class="flex gap-3 w-full sm:w-auto">
        <div class="relative w-full sm:w-80">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="searchInput" class="field pl-9" placeholder="ค้นหา S/N, Model, หรือ Supplier..." />
        </div>
        <button id="refreshBtn" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white p-2 rounded-lg transition-colors flex items-center justify-center" title="รีเฟรชข้อมูล">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6 shrink-0">
      <div class="panel rounded-xl p-4">
        <p class="text-[10px] uppercase tracking-widest text-white/40 font-semibold">จำนวนรวมทั้งหมด (รายการ)</p>
        <p class="text-2xl font-bold text-white mt-1" id="stat-total">0</p>
      </div>
      <div class="panel rounded-xl p-4">
        <p class="text-[10px] uppercase tracking-widest text-white/40 font-semibold">Model ที่มีในระบบ (รุ่น)</p>
        <p class="text-2xl font-bold text-white mt-1" id="stat-models">0</p>
      </div>
    </div>

    <!-- Data Table Panel -->
    <div class="panel rounded-2xl overflow-hidden flex flex-col flex-1 min-h-[300px]">
      
      <!-- Loading State -->
      <div id="loadingState" class="absolute inset-0 z-20 bg-navy/80 backdrop-blur-sm flex flex-col items-center justify-center hidden rounded-2xl">
        <div class="loader mb-3"></div>
        <p class="text-sm text-white/60 font-mono tracking-wider">กำลังดึงข้อมูล...</p>
      </div>

      <div class="overflow-auto flex-1 relative">
        <table class="data-table w-full">
          <thead>
            <tr>
              <th style="width:160px">วันที่รับเข้า</th>
              <th>Model</th>
              <th>Serial Number (S/N)</th>
              <th>Supplier</th>
              <th>Invoice</th>
              <th>หมายเหตุ</th>
            </tr>
          </thead>
          <tbody id="inventory-tbody">
            <!-- ข้อมูลจะถูก render ตรงนี้ -->
          </tbody>
        </table>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center w-full">
          <svg class="w-12 h-12 text-white/10 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
          <p class="text-sm font-semibold text-white/30">ไม่พบข้อมูลในคลังสินค้า</p>
        </div>
      </div>
    </div>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 📍 ตั้งค่า Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDKnlB-dWr60Aanaa5g9Av7NdB9pIutcnw",
      authDomain: "advancedplus-stock.firebaseapp.com",
      projectId: "advancedplus-stock",
      storageBucket: "advancedplus-stock.firebasestorage.app",
      messagingSenderId: "406022848223",
      appId: "1:406022848223:web:0d625edcb7720d1d6db36a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allInventoryData = [];

    // ==========================================
    // ฟังก์ชันดึงข้อมูลทั้งหมดจาก Firestore
    // ==========================================
    async function loadInventory() {
      const loader = document.getElementById('loadingState');
      loader.classList.remove('hidden');
      
      try {
        allInventoryData = [];
        // ดึงข้อมูลโดยเรียงจากใหม่ไปเก่า (ตาม timestamp)
        const q = query(collection(db, "inbound_stock"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);

        querySnapshot.forEach((doc) => {
          const batch = doc.data();
          const batchTime = batch.timestamp ? batch.timestamp.toDate() : new Date();
          
          if (batch.items && Array.isArray(batch.items)) {
            batch.items.forEach(item => {
              allInventoryData.push({
                date: batchTime,
                model: item.model || "-",
                sn: item.sn || "-",
                supplier: item.supplier || "-",
                invoice: item.invoice || "-",
                note: item.note || "-"
              });
            });
          }
        });

        renderTable(allInventoryData);
        updateStats();

      } catch (error) {
        console.error("Error fetching inventory:", error);
        alert("เกิดข้อผิดพลาดในการดึงข้อมูล กรุณาลองใหม่อีกครั้ง");
      } finally {
        loader.classList.add('hidden');
      }
    }

    // ==========================================
    // Render ข้อมูลลงตาราง
    // ==========================================
    function renderTable(dataArray) {
      const tbody = document.getElementById('inventory-tbody');
      const emptyState = document.getElementById('empty-state');
      
      if (dataArray.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
        return;
      }

      emptyState.classList.add('hidden');
      emptyState.classList.remove('flex');

      tbody.innerHTML = dataArray.map(row => {
        const dateStr = row.date.toLocaleString('th-TH', { 
          year: 'numeric', month: 'short', day: 'numeric', 
          hour: '2-digit', minute:'2-digit' 
        });
        return `
          <tr>
            <td class="text-white/50 text-xs font-mono">${dateStr}</td>
            <td class="font-medium text-white/90">${esc(row.model)}</td>
            <td class="font-mono text-ember font-semibold tracking-wider">${esc(row.sn)}</td>
            <td class="text-white/70">${esc(row.supplier)}</td>
            <td class="font-mono text-xs text-white/50">${esc(row.invoice)}</td>
            <td class="text-xs text-white/40 max-w-[200px] truncate" title="${esc(row.note)}">${esc(row.note)}</td>
          </tr>
        `;
      }).join('');
    }

    // ==========================================
    // อัปเดตตัวเลขสถิติ
    // ==========================================
    function updateStats() {
      document.getElementById('stat-total').textContent = allInventoryData.length.toLocaleString();
      const uniqueModels = new Set(allInventoryData.map(item => item.model)).size;
      document.getElementById('stat-models').textContent = uniqueModels.toLocaleString();
    }

    // ==========================================
    // ระบบค้นหา (Search)
    // ==========================================
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      if (!term) {
        renderTable(allInventoryData);
        return;
      }
      
      const filtered = allInventoryData.filter(item => 
        item.sn.toLowerCase().includes(term) ||
        item.model.toLowerCase().includes(term) ||
        item.supplier.toLowerCase().includes(term) ||
        item.invoice.toLowerCase().includes(term)
      );
      renderTable(filtered);
    });

    // ปุ่มรีเฟรช
    document.getElementById('refreshBtn').addEventListener('click', loadInventory);

    // ป้องกัน HTML Injection
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // โหลดข้อมูลครั้งแรก
    loadInventory();
  </script>
</body>
</html>
